name: convenatAI
region: fra
services:
  - name: api
    type: web
    port: 8001
    health_check:
      path: /api/stats
    routes:
      - path: /
    instance_count: 1
    instance_type: nano
    scalings:
      min: 1
      max: 1
  - name: worker
    type: worker
    instance_count: 1
    instance_type: nano
    scalings:
      min: 1
      max: 1
