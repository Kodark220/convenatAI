name: convenatAI
region: fra
services:
  - name: api
    type: web
    port: 8001
    health_check:
      path: /api/stats
    routes:
      - path: /
    instance_count: 1
    instance_type: nano
    build:
      build_command: pip install --user -e . 2>&1 | tail -3
      run_command: python3 serve.py
    scalings:
      min: 1
      max: 1
  - name: worker
    type: worker
    instance_count: 1
    instance_type: nano
    build:
      build_command: pip install --user -e . 2>&1 | tail -3
    run_command: python3 worker.py --interval 120
    scalings:
      min: 1
      max: 1
